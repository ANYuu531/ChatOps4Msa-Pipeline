# Platform services the app services depend on at startup. Apply these FIRST and
# wait for both to be Ready, then apply 20-services.yaml — the app services fetch
# their config from config-server and register with discovery-server (Eureka).
#
# The Service names MUST be exactly `config-server` and `discovery-server`: the
# app services run with SPRING_PROFILES_ACTIVE=docker, whose config addresses them
# by those hostnames (resolved via Kubernetes DNS).
#
# config-server clones its config from GitHub on startup, so the cluster machine
# must have outbound internet. If it cannot reach GitHub it will not become Ready.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: petclinic
  labels: { app: config-server }
spec:
  replicas: 1
  selector:
    matchLabels: { app: config-server }
  template:
    metadata:
      labels: { app: config-server, version: v1 }
    spec:
      containers:
        - name: config-server
          image: springcommunity/spring-petclinic-config-server:latest
          ports:
            - containerPort: 8888
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=60.0 -XX:+UseSerialGC"
          resources:
            requests: { memory: "320Mi", cpu: "100m" }
            limits: { memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8888 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: petclinic
  labels: { app: config-server }
spec:
  selector: { app: config-server }
  ports:
    - name: http
      port: 8888
      targetPort: 8888
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  namespace: petclinic
  labels: { app: discovery-server }
spec:
  replicas: 1
  selector:
    matchLabels: { app: discovery-server }
  template:
    metadata:
      labels: { app: discovery-server, version: v1 }
    spec:
      containers:
        - name: discovery-server
          image: springcommunity/spring-petclinic-discovery-server:latest
          ports:
            - containerPort: 8761
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=60.0 -XX:+UseSerialGC"
          resources:
            requests: { memory: "320Mi", cpu: "100m" }
            limits: { memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8761 }
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  namespace: petclinic
  labels: { app: discovery-server }
spec:
  selector: { app: discovery-server }
  ports:
    - name: http
      port: 8761
      targetPort: 8761
