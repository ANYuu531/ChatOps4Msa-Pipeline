info:
  version: 1.0.0
  title: dependency
  description: |
    Analyze microservice dependencies and generate a report.

low_code:
  property:
    prometheus_host_url: ${secret.prometheus_host_url}

  operation:
    - name: get-dependency-analysis
      parameter:
        repo_name: GitHub repository in owner/repo format, e.g. "myorg/bookinfo"
        namespace: Kubernetes namespace, e.g. "default"
        entry_url: Use 'auto' to detect the entry and drive traffic, a URL to override, or 'none' for manual.
      description: |
        Analyze microservice dependencies and generate a report.
      access: public
      body:
        - toolkit-discord-text:
            text: "DEBUG: start dependency analysis"

        - toolkit-mcp-connect:
            server_name: deepwiki
            base_url: https://mcp.deepwiki.com
            endpoint: /mcp
            assign: connect_deepwiki_result

        - toolkit-discord-text:
            text: "DEBUG: connected DeepWiki"

        - toolkit-mcp-call-tool:
            server_name: deepwiki
            tool_name: read_wiki_contents
            tool_arguments: |
              {"repoName": "${repo_name}"}
            assign: wiki_contents

        - toolkit-discord-text:
            text: "DEBUG: wiki contents loaded"

        # ---- Optimization 3: deterministic Java/Spring code extraction ----
        # NOTE: no toolkit-flow-if here on purpose. The orchestrator treats flow-if as
        # terminal (it breaks out of the rest of the body once a branch runs), so all
        # branching is done INSIDE the toolkit. toolkit-code-extract-java clones the repo,
        # auto-detects Spring Boot from pom.xml/build.gradle, and either extracts
        # (JavaParser AST) or returns a "skipped: not Spring Boot" note. Always safe to run.
        - toolkit-discord-text:
            text: "DEBUG: running deterministic code extraction (auto-detects Spring Boot)"

        - toolkit-code-extract-java:
            repo: ${repo_name}
            assign: code_extraction_notes

        - toolkit-discord-text:
            text: |
              DEBUG: code_extraction_notes

              ${code_extraction_notes}

        - toolkit-prompt-template:
            template: deepwiki_question_responsibility
            assign: deepwiki_question

        - toolkit-mcp-call-tool:
            server_name: deepwiki
            tool_name: ask_question
            tool_arguments: |
              {"repoName":"${repo_name}","question":"${deepwiki_question}"}
            assign: deepwiki_responsibility

        - toolkit-prompt-template:
            template: deepwiki_question_synchronous
            assign: deepwiki_question

        - toolkit-mcp-call-tool:
            server_name: deepwiki
            tool_name: ask_question
            tool_arguments: |
              {"repoName":"${repo_name}","question":"${deepwiki_question}"}
            assign: deepwiki_synchronous

        - toolkit-prompt-template:
            template: deepwiki_question_asynchronous
            assign: deepwiki_question

        - toolkit-mcp-call-tool:
            server_name: deepwiki
            tool_name: ask_question
            tool_arguments: |
              {"repoName":"${repo_name}","question":"${deepwiki_question}"}
            assign: deepwiki_asynchronous

        - toolkit-prompt-template:
            template: deepwiki_question_external
            assign: deepwiki_question

        - toolkit-mcp-call-tool:
            server_name: deepwiki
            tool_name: ask_question
            tool_arguments: |
              {"repoName":"${repo_name}","question":"${deepwiki_question}"}
            assign: deepwiki_external

        - toolkit-prompt-template:
            template: deepwiki_question_flow
            assign: deepwiki_question

        - toolkit-mcp-call-tool:
            server_name: deepwiki
            tool_name: ask_question
            tool_arguments: |
              {"repoName":"${repo_name}","question":"${deepwiki_question}"}
            assign: deepwiki_flow

        - toolkit-discord-text:
            text: |
              DEBUG: DeepWiki questions done

              Responsibility:
              ${deepwiki_responsibility}

              Synchronous:
              ${deepwiki_synchronous}

              Asynchronous:
              ${deepwiki_asynchronous}

              External:
              ${deepwiki_external}

              Flow:
              ${deepwiki_flow}

        - toolkit-llm-call:
            prompt: |
              ## DeepWiki 分析 - 服務清單與各自職責
              ${deepwiki_responsibility}

              ## DeepWiki 分析 - 同步呼叫關係
              ${deepwiki_synchronous}

              ## DeepWiki 分析 - 非同步通訊與事件
              ${deepwiki_asynchronous}

              ## DeepWiki 分析 - 外部依賴
              ${deepwiki_external}

              ## DeepWiki 分析 - 架構模式與入口點
              ${deepwiki_flow}

              ## 程式碼確定性抽取 - Java/Spring 依賴 (JavaParser AST; 若架構不支援則為 fallback 說明)
              ${code_extraction_notes}
            prompt_template: deepwiki_dependency_notes
            assign: deepwiki_dependency_notes

        - toolkit-discord-text:
            text: |
              DEBUG: deepwiki_dependency_notes

              ${deepwiki_dependency_notes}

        - toolkit-mcp-connect:
            server_name: k8s
            base_url: http://k8s-mcp-server:8000
            endpoint: /mcp
            assign: connect_k8s_result

        - toolkit-discord-text:
            text: "DEBUG: connected K8s MCP"

        - toolkit-mcp-call-tool:
            server_name: k8s
            tool_name: execute_kubectl
            tool_arguments: |
              {"command":"get services -n ${namespace} -o custom-columns=NAME:.metadata.name,TYPE:.spec.type,PORTS:.spec.ports[*].port,TARGETPORTS:.spec.ports[*].targetPort,SELECTOR:.spec.selector --no-headers", "timeout": 20}
            assign: k8s_services

        - toolkit-mcp-call-tool:
            server_name: k8s
            tool_name: execute_kubectl
            tool_arguments: |
              {"command":"get deployments -n ${namespace} -o custom-columns=NAME:.metadata.name,READY:.status.readyReplicas,REPLICAS:.status.replicas,IMAGES:.spec.template.spec.containers[*].image,LABELS:.metadata.labels --no-headers", "timeout": 20}
            assign: k8s_deployments

        - toolkit-mcp-call-tool:
            server_name: k8s
            tool_name: execute_kubectl
            tool_arguments: |
              {"command":"get pods -n ${namespace} -o custom-columns=NAME:.metadata.name,READY:.status.containerStatuses[*].ready,STATUS:.status.phase,LABELS:.metadata.labels --no-headers", "timeout": 20}
            assign: k8s_pods

        - toolkit-mcp-call-tool:
            server_name: k8s
            tool_name: execute_kubectl
            tool_arguments: |
              {"command":"get endpointslices -n ${namespace} -o custom-columns=SERVICE:.metadata.labels.kubernetes\\.io/service-name,ENDPOINTS:.endpoints[*].addresses,PORTS:.ports[*].port --no-headers", "timeout": 20}
            assign: k8s_endpoint_slices

        - toolkit-mcp-call-tool:
            server_name: k8s
            tool_name: execute_kubectl
            tool_arguments: |
              {"command":"get virtualservices -n ${namespace} -o custom-columns=NAME:.metadata.name,HOSTS:.spec.hosts,GATEWAYS:.spec.gateways,DEST:.spec.http[*].route[*].destination.host --no-headers", "timeout": 20}
            assign: istio_virtual_services

        - toolkit-mcp-call-tool:
            server_name: k8s
            tool_name: execute_kubectl
            tool_arguments: |
              {"command":"get destinationrules -n ${namespace} -o custom-columns=NAME:.metadata.name,HOST:.spec.host,SUBSETS:.spec.subsets[*].name --no-headers", "timeout": 20}
            assign: istio_destination_rules

        - toolkit-discord-text:
            text: |
              DEBUG: K8s runtime data collected

              Services:
              ${k8s_services}

              Deployments:
              ${k8s_deployments}

              Pods:
              ${k8s_pods}

              EndpointSlices:
              ${k8s_endpoint_slices}

              VirtualServices:
              ${istio_virtual_services}

              DestinationRules:
              ${istio_destination_rules}

        - toolkit-discord-text:
            text: "DEBUG: calling k8s_runtime_notes LLM"

        - toolkit-llm-call:
            prompt: |
              ## Kubernetes Services
              ${k8s_services}

              ## Kubernetes Deployments
              ${k8s_deployments}

              ## Kubernetes Pods 與 Labels
              ${k8s_pods}

              ## EndpointSlices
              ${k8s_endpoint_slices}

              ## Istio VirtualServices
              ${istio_virtual_services}

              ## Istio DestinationRules
              ${istio_destination_rules}
            prompt_template: k8s_runtime_notes
            assign: k8s_runtime_notes

        - toolkit-discord-text:
            text: |
              DEBUG: k8s_runtime_notes

              ${k8s_runtime_notes}

        # ---- Optimization 1: drive traffic + collect Istio runtime evidence ----
        # Resolve entry + drive traffic in one toolkit (no flow-if; see note above).
        # 'auto' -> detect NodePort/LoadBalancer entry from k8s_services and drive it;
        # a URL -> drive it; 'none'/other or no entry found -> returns manual guidance.
        # Runs synchronously (in-cluster HTTP) so traffic is done before the metric query.
        - toolkit-discord-text:
            text: "DEBUG: driving end-to-end traffic (entry_url=${entry_url})"

        - toolkit-traffic-auto_drive:
            entry_url: ${entry_url}
            namespace: ${namespace}
            k8s_services: ${k8s_services}
            requests: 60
            assign: traffic_result

        - toolkit-discord-text:
            text: |
              DEBUG: traffic result

              ${traffic_result}

        - toolkit-discord-text:
            text: "DEBUG: querying Prometheus for Istio runtime edges (cumulative counter)"

        # Cumulative counter: captures every edge observed at least once. PromQL is
        # URL-encoded inline because toolkit-restapi-get only accepts a URL and the
        # namespace has no special chars.
        - toolkit-restapi-get:
            url: ${prometheus_host_url}/api/v1/query?query=sum%20by(source_workload,destination_workload)(istio_requests_total%7Breporter%3D%22destination%22,destination_workload_namespace%3D%22${namespace}%22%7D)
            assign: istio_requests_raw

        - toolkit-discord-text:
            text: |
              DEBUG: istio_requests_total raw result

              ${istio_requests_raw}

        - toolkit-llm-call:
            prompt: |
              ## Prometheus instant query result (istio_requests_total, namespace=${namespace})
              ${istio_requests_raw}
            prompt_template: istio_runtime_edges
            assign: runtime_edges_notes

        - toolkit-discord-text:
            text: |
              DEBUG: runtime_edges_notes

              ${runtime_edges_notes}

        - toolkit-discord-text:
            text: "DEBUG: calling final dependency_analysis LLM"

        # ---- Optimization 2: completeness / health check BEFORE the report ----
        # The gap list is shown first so the user can decide (via the buttons below)
        # whether to generate the report now or pause to supplement and re-run.
        - toolkit-discord-text:
            text: "DEBUG: running completeness health check (before report)"

        - toolkit-llm-call:
            prompt: |
              ## DeepWiki dependency notes
              ${deepwiki_dependency_notes}

              ## Kubernetes / Istio runtime notes
              ${k8s_runtime_notes}

              ## Istio runtime-observed edge ledger
              ${runtime_edges_notes}
            prompt_template: dependency_health_check
            assign: health_check

        - toolkit-discord-text:
            text: |
              ## Analysis Completeness & Supplement Suggestions
              **Namespace:** `${namespace}`

              ${health_check}

        # ---- Checkpoint: save evidence + ask continue / pause via buttons ----
        # The final report is produced only when the user clicks "繼續產生報告"
        # (handled in ButtonListener -> DependencyReportService, using the saved
        # evidence so nothing is re-collected).
        - toolkit-depstate-checkpoint:
            repo_name: ${repo_name}
            namespace: ${namespace}
            deepwiki_notes: ${deepwiki_dependency_notes}
            k8s_notes: ${k8s_runtime_notes}
            runtime_notes: ${runtime_edges_notes}

    - name: supplement-dependency-traffic
      parameter:
        namespace: Kubernetes namespace, e.g. "default"
      description: Re-query Istio runtime traffic to fill Runtime Observed gaps after driving load.
      access: public
      body:
        - toolkit-discord-text:
            text: "DEBUG: re-querying Istio runtime edges for ${namespace}"

        - toolkit-restapi-get:
            url: ${prometheus_host_url}/api/v1/query?query=sum%20by(source_workload,destination_workload)(istio_requests_total%7Breporter%3D%22destination%22,destination_workload_namespace%3D%22${namespace}%22%7D)
            assign: istio_requests_raw

        - toolkit-discord-text:
            text: |
              DEBUG: istio_requests_total raw result

              ${istio_requests_raw}

        - toolkit-llm-call:
            prompt: |
              ## Prometheus instant query result (istio_requests_total, namespace=${namespace})
              ${istio_requests_raw}
            prompt_template: istio_runtime_edges
            assign: runtime_edges_notes

        - toolkit-discord-text:
            text: |
              ## Updated Istio Runtime-Observed Edge Ledger
              **Namespace:** `${namespace}`

              ${runtime_edges_notes}