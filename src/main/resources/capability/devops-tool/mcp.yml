info:
  version: 1.0.0
  title: MCP Toolkit
  description: |
    Use selected MCP server to execute tools via ChatOps.

low_code:
  operation:
    - name: get-mcp-call-tool
      parameter:
        server_name: MCP session name, e.g. "k8s" or "deepwiki"
        base_url: MCP server base URL, e.g. "http://k8s-mcp-server:8000"
        endpoint: MCP endpoint, e.g. "/mcp"
        tool_name: MCP tool name, e.g. "execute_kubectl"
        tool_arguments: MCP tool arguments JSON string
      description: |
        Connect to selected MCP server and call selected MCP tool.
      access: public
      body:
        - toolkit-mcp-connect:
            server_name: ${server_name}
            base_url: ${base_url}
            endpoint: ${endpoint}
            assign: connect_msg

        - toolkit-mcp-list-tools:
            server_name: ${server_name}
            assign: tools

        - toolkit-mcp-call-tool:
            server_name: ${server_name}
            tool_name: ${tool_name}
            tool_arguments: |
              ${tool_arguments}
            assign: result

        - toolkit-mcp-disconnect:
            server_name: ${server_name}
            assign: disconnect_msg

        - toolkit-discord-text:
            text: |
              **MCP Tool 呼叫結果**

              Server:
              `${server_name}`

              Endpoint:
              `${base_url}${endpoint}`

              Tool:
              `${tool_name}`

              Arguments:
              ```json
              ${tool_arguments}
              ```

              Connect:
              ${connect_msg}

              Tools:
              ${tools}

              Result:
              ${result}

              Disconnect:
              ${disconnect_msg}
            assign: pipeline