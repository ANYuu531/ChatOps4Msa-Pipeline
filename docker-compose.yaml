# ChatOps4Msa control-plane side.
#
# The Kubernetes cluster (k8s + Istio + the system under analysis, e.g. sock-shop
# or train-ticket) runs on a SEPARATE machine on the same LAN. Nothing in this
# file starts a cluster; this side only talks to one over the network.
# See docs/split-deployment.md.
#
# Everything not needed for a dependency-analysis run sits behind a compose
# profile, so it does not start by default — the whole point of splitting the
# machines is to stop spending RAM here that the cluster needs there.
#
#   docker compose up -d                        core only (app + k8s-mcp + rabbitmq)
#   docker compose --profile monitoring up -d   + prometheus/grafana/exporters
#   docker compose --profile bookinfo up -d     + the compose (non-k8s) bookinfo
#   docker compose --profile trello up -d       + trello

services:

# Core =====================================================================

  chatops4msa:
    container_name: chatops4msa
    build:
      context: .
    restart: unless-stopped
    environment:
      - TZ=Asia/Taipei
    volumes:
      - /etc/localtime:/etc/localtime:ro
      # k6 is launched as a sibling container through the host's Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      - ./k6:/k6
      # Dependency-analysis checkpoints. Mounted so a restart does not discard a
      # paused analysis — DeepWiki's questions and the repo clone are the
      # expensive stages and resuming is supposed to skip them.
      - ./dep-state:/app/dep-state
    depends_on:
      - rabbitmq
      - k8s-mcp-server
    ports:
      - 8080:8080

  # Runs kubectl/helm/istioctl against the cluster on behalf of the bot.
  #
  # It previously ran as a POD INSIDE the cluster, which is why the analysis was
  # unstable: it competed for memory with the very system it was measuring. Moving
  # it here costs almost nothing (it is a thin kubectl wrapper) and takes its
  # memory off the experiment machine entirely. It does not need to be in the
  # cluster — only a kubeconfig plus network reach to the API server.
  #
  # NOTE ON THE SERVICE NAME: it must stay `k8s-mcp-server`. The patched build
  # enables MCP transport-security DNS-rebinding protection with an allowed_hosts
  # allowlist containing `k8s-mcp-server:*`. Renaming the service, or reaching it
  # by IP:port instead of by name, makes the Host header fall outside the
  # allowlist and the request is REJECTED — add the new host to allowed_hosts
  # first if you ever change this.
  k8s-mcp-server:
    container_name: k8s-mcp-server
    # Built from OUR PATCHED FORK, not the upstream image. The fork carries fixes
    # upstream does not have:
    #   - CommandResult as a dataclass + asdict()  (upstream fails to serialise it)
    #   - the allowed_hosts allowlist below
    #   - traceback logging on crash (upstream exits 255 silently, which is why the
    #     instability was so hard to diagnose)
    # Point K8S_MCP_SRC at your checkout of the fork.
    build:
      context: ${K8S_MCP_SRC:-../k8s-mcp-server}
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    environment:
      # The server defaults to stdio transport (for Claude Desktop), which opens
      # no HTTP listener at all. HTTP is required for toolkit-mcp-connect.
      - K8S_MCP_TRANSPORT=streamable-http
      - KUBECONFIG=/tmp/kubeconfig
      - TZ=Asia/Taipei
    volumes:
      # Running outside the cluster means there is no ServiceAccount to borrow, so
      # a kubeconfig must be supplied. Its `server:` must be the cluster machine's
      # LAN address — NOT 127.0.0.1, which inside this container resolves to the
      # container itself.
      - ./kube/config:/tmp/kubeconfig:ro
    ports:
      # chatops4msa reaches this by service name on the compose network; this is
      # published only for debugging.
      - 8000:8000

  rabbitmq:
    image: rabbitmq:3.8-management
    container_name: chatops4msa-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=soselab
    volumes:
      - ./rabbitmq/data:/var/lib/rabbitmq
      - /etc/localtime:/etc/localtime:ro

# Monitoring (profile: monitoring) =========================================
#
# ChatOps4Msa's OWN monitoring stack, used by the prometheus/grafana
# capabilities. This is NOT the Prometheus the dependency analysis reads:
# istio_requests_total is only collected by Istio's Prometheus, which runs inside
# the cluster on the other machine. The two are separate settings in secret.yml
# (prometheus_host_url vs istio_prometheus_host_url).

  prometheus:
    profiles: ["monitoring"]
    container_name: chatops4msa-prometheus
    image: prom/prometheus:v2.30.0
    volumes:
      - ./prometheus/config:/etc/prometheus
      - ./prometheus/data:/prometheus
    environment:
      - TZ="Asia/Taipei"
    ports:
      - 9090:9090

  node-exporter:
    profiles: ["monitoring"]
    container_name: chatops4msa-prometheus-node-exporter
    image: prom/node-exporter:v1.2.2
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    environment:
      - TZ="Asia/Taipei"
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--no-collector.arp'
      - '--no-collector.netstat'
      - '--no-collector.netdev'
      - '--no-collector.softnet'

  alertmanager:
    profiles: ["monitoring"]
    container_name: chatops4msa-prometheus-alertmanager
    image: prom/alertmanager:v0.23.0
    restart: unless-stopped
    volumes:
      - ./prometheus/alertmanager:/etc/alertmanager
    environment:
      - TZ="Asia/Taipei"
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'

  grafana:
    profiles: ["monitoring"]
    container_name: chatops4msa-grafana
    image: grafana/grafana:8.1.5
    restart: unless-stopped
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - /etc/localtime:/etc/localtime:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=soselab
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - 3000:3000

  cadvisor:
    profiles: ["monitoring"]
    container_name: chatops4msa-prometheus-google-cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 8081:8080
    privileged: true
    devices:
      - /dev/kmsg

# Sample systems (profiles) ================================================
#
# These bookinfo containers are the COMPOSE deployment of bookinfo — a different
# deployment from the bookinfo you install into Kubernetes. The dependency
# analysis inspects the Kubernetes one (through k8s-mcp and Istio), so these are
# not involved in it and stay off by default.

  productpage:
    profiles: ["bookinfo"]
    container_name: chatops4msa-bookinfo-productpage
    build:
      context: ../ChatOps4Msa-Sample-Bookinfo-Productpage/src/productpage
      args:
        - flood_factor=100
    volumes:
      - /etc/localtime:/etc/localtime:ro
    ports:
      - '9080:9080'

  details:
    profiles: ["bookinfo"]
    container_name: chatops4msa-bookinfo-details
    build:
      context: ../ChatOps4Msa-Sample-Bookinfo-Details/src/details
      args:
        - service_version=v2
        - enable_external_book_service=true
    volumes:
      - /etc/localtime:/etc/localtime:ro
    ports:
      - '9081:9080'

  ratings:
    profiles: ["bookinfo"]
    container_name: chatops4msa-bookinfo-ratings
    build:
      context: ../ChatOps4Msa-Sample-Bookinfo-Ratings/src/ratings
      args:
        - service_version=v2
    volumes:
      - /etc/localtime:/etc/localtime:ro
    ports:
      - '9082:9080'

  reviews:
    profiles: ["bookinfo"]
    container_name: chatops4msa-bookinfo-reviews
    build:
      context: ../ChatOps4Msa-Sample-Bookinfo-Reviews/src/reviews
      args:
        - service_version=v3
        - enable_ratings=true
        - star_color=red
    volumes:
      - /etc/localtime:/etc/localtime:ro
    ports:
      - '9083:9080'

  trello:
    profiles: ["trello"]
    container_name: chatops4mas-trello
    build:
      context: ../ChatOps4Msa-Trello
    ports:
      - '9000:8080'
